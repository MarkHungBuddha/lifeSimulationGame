<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
</head>
<body>
  <script>
    const redirect = `${window.location.pathname}${window.location.search}`
    window.location.replace(`/?redirect=${encodeURIComponent(redirect)}${window.location.hash}`)
  </script>
</body>
</html>
